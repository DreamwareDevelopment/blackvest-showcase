name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `astro build` produces the exact static output Cloudflare Pages
      # deploys. A broken build here = a broken Pages deploy; catching it on
      # the PR keeps main deployable. No secrets required.
      - run: npm run build

  # CD: deploy the built site to Cloudflare Pages on push to main, only after
  # `build` passes. Skipped on PRs. Replaces the manual `wrangler pages deploy`
  # (this is a direct-upload Pages project, not git-connected).
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name blackvest-showcase --branch main
