name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `astro build` produces the exact static output Cloudflare Pages
      # deploys. A broken build here = a broken Pages deploy; catching it on
      # the PR keeps main deployable. No secrets required.
      - run: npm run build
